name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # None of these are real secrets: the Postgres service container is
  # ephemeral/never exposed, and OAuth's real token exchange isn't exercised
  # by the test suite (see tests/integration/oauth.test.ts).
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskflow
  DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/taskflow_test
  JWT_ACCESS_SECRET: ci-access-secret-not-for-production
  JWT_REFRESH_SECRET: ci-refresh-secret-not-for-production
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  GOOGLE_CLIENT_ID: ci-placeholder
  GOOGLE_CLIENT_SECRET: ci-placeholder
  GITHUB_CLIENT_ID: ci-placeholder
  GITHUB_CLIENT_SECRET: ci-placeholder

jobs:
  checks:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:integration
